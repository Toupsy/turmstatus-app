<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turmstatus – Admin-Panel</title>
<style>
  :root{--navy:#0a1929;--navy-2:#0f2438;--deep:#061320;--sea:#0d7ca8;--sea-bright:#18a8d8;--foam:#7fd4e8;--coral:#ff5a4d;--green:#3ec98a;--line:rgba(127,212,232,0.14);--line-strong:rgba(127,212,232,0.28);--text:#e8f4f8;--text-dim:#8ba9b8;--paper:#11293d}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,sans-serif;background:linear-gradient(180deg,var(--deep),var(--navy));color:var(--text);min-height:100vh;padding:20px}
  h1{font-size:1.2rem;text-transform:uppercase;margin-bottom:4px}
  h1 .accent{color:var(--sea-bright)}
  .muted{color:var(--text-dim);font-size:.85rem}
  .panel{background:linear-gradient(165deg,var(--navy-2),var(--paper));border:1px solid var(--line);border-radius:14px;padding:18px;margin:16px 0;max-width:1000px}
  h2{font-size:.95rem;text-transform:uppercase;color:var(--foam);margin-bottom:12px}
  button{font:inherit;cursor:pointer;border:1px solid var(--line-strong);background:rgba(24,168,216,.1);color:var(--text);border-radius:8px;padding:7px 12px}
  button.primary{background:var(--sea);border-color:var(--sea-bright)}
  button.danger{background:rgba(255,90,77,.14);border-color:var(--coral)}
  input,select{font:inherit;background:rgba(6,19,32,.6);border:1px solid var(--line-strong);color:var(--text);border-radius:8px;padding:8px 10px}
  label{display:block;font-size:.8rem;color:var(--text-dim);margin:8px 0 4px}
  table{width:100%;border-collapse:collapse;font-size:.86rem}
  th,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--line)}
  th{color:var(--text-dim);font-size:.74rem;text-transform:uppercase}
  .err{color:var(--coral);font-size:.84rem;min-height:1.2em}
  #login-box{max-width:360px}
  .hidden{display:none}
</style>
</head>
<body>
  <h1>Turm<span class="accent">status</span> – Admin-Panel</h1>
  <div class="muted">Benutzerverwaltung & Audit-Protokoll (nur Hauptwache/Admin)</div>

  <div id="login-box" class="panel">
    <h2>Anmeldung</h2>
    <form id="login-form">
      <label>Benutzername</label><input id="u" autocomplete="username">
      <label>Passwort</label><input id="p" type="password" autocomplete="current-password">
      <div class="err" id="login-err"></div>
      <div style="margin-top:12px"><button class="primary" type="submit">Anmelden</button></div>
    </form>
  </div>

  <div id="admin-box" class="hidden">
    <div class="panel">
      <h2>Benutzer <button class="primary" id="new-user-btn" style="float:right">+ Neu</button></h2>
      <div id="users"></div>
    </div>
    <div class="panel">
      <h2>Neuer/Bearbeiteter Benutzer</h2>
      <input type="hidden" id="form-id">
      <label>Benutzername</label><input id="form-username">
      <label>Voller Name</label><input id="form-fullname">
      <label>Rolle</label>
      <select id="form-role"><option value="WACHGAENGER">Wachgänger</option><option value="TURMFUEHRER">Turmführer</option><option value="HAUPTWACHE">Hauptwache</option></select>
      <label>Passwort (nur bei neuem Benutzer / Reset)</label><input id="form-password" type="password">
      <div class="err" id="form-err"></div>
      <div style="margin-top:12px"><button class="primary" id="save-btn">Speichern</button> <button id="reset-pw-btn">Passwort zurücksetzen</button></div>
    </div>
    <div class="panel">
      <h2>Audit-Protokoll</h2>
      <div id="audit"></div>
    </div>
  </div>

<script>
const esc = s => String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
async function req(method, url, body){
  const o={method,credentials:'include',headers:{}};
  if(body!==undefined){o.headers['Content-Type']='application/json';o.body=JSON.stringify(body);}
  const r=await fetch(url,o); let d=null; try{d=await r.json();}catch(e){}
  if(!r.ok) throw new Error((d&&d.error)||('HTTP '+r.status));
  return d;
}

async function showAdmin(){
  document.getElementById('login-box').classList.add('hidden');
  document.getElementById('admin-box').classList.remove('hidden');
  await loadUsers(); await loadAudit();
}

async function loadUsers(){
  const {users}=await req('GET','/api/admin/users');
  document.getElementById('users').innerHTML =
    '<table><thead><tr><th>Benutzer</th><th>Name</th><th>Rolle</th><th>Aktiv</th><th>Aktion</th></tr></thead><tbody>'+
    users.map(u=>`<tr><td>${esc(u.username)}</td><td>${esc(u.fullName||'–')}</td><td>${esc(u.role)}</td><td>${u.isActive?'✓':'✗'}</td>
      <td><button onclick='edit(${JSON.stringify(u)})'>Bearbeiten</button> <button class="danger" onclick="del(${u.id})">Löschen</button></td></tr>`).join('')+
    '</tbody></table>';
}
async function loadAudit(){
  const {entries}=await req('GET','/api/admin/audit-log?limit=100');
  document.getElementById('audit').innerHTML =
    '<table><thead><tr><th>Zeit</th><th>Akteur</th><th>Aktion</th><th>Objekt</th></tr></thead><tbody>'+
    entries.map(e=>`<tr><td>${esc(e.timestamp)}</td><td>${esc(e.actor||'System')}</td><td>${esc(e.action)}</td><td>${esc(e.entityType||'–')} ${e.entityId||''}</td></tr>`).join('')+
    '</tbody></table>';
}

function edit(u){
  document.getElementById('form-id').value=u.id;
  document.getElementById('form-username').value=u.username;
  document.getElementById('form-username').disabled=true;
  document.getElementById('form-fullname').value=u.fullName||'';
  document.getElementById('form-role').value=u.role;
  document.getElementById('form-password').value='';
  document.getElementById('form-err').textContent='';
}
function newUser(){
  document.getElementById('form-id').value='';
  document.getElementById('form-username').value='';
  document.getElementById('form-username').disabled=false;
  document.getElementById('form-fullname').value='';
  document.getElementById('form-role').value='WACHGAENGER';
  document.getElementById('form-password').value='';
  document.getElementById('form-err').textContent='';
}
async function save(){
  const id=document.getElementById('form-id').value;
  const err=document.getElementById('form-err');
  const payload={fullName:document.getElementById('form-fullname').value,role:document.getElementById('form-role').value};
  try{
    if(id){ await req('PATCH','/api/admin/users/'+id,payload); }
    else{ payload.username=document.getElementById('form-username').value; payload.password=document.getElementById('form-password').value; await req('POST','/api/admin/users',payload); }
    await loadUsers(); await loadAudit(); newUser();
  }catch(e){ err.textContent=e.message; }
}
async function resetPw(){
  const id=document.getElementById('form-id').value;
  const pw=document.getElementById('form-password').value;
  const err=document.getElementById('form-err');
  if(!id){ err.textContent='Erst einen Benutzer bearbeiten.'; return; }
  try{ await req('POST','/api/admin/users/'+id+'/reset-password',{newPassword:pw}); err.textContent=''; alert('Passwort zurückgesetzt'); }
  catch(e){ err.textContent=e.message; }
}
async function del(id){
  if(!confirm('Benutzer löschen?')) return;
  try{ await req('DELETE','/api/admin/users/'+id); await loadUsers(); await loadAudit(); }
  catch(e){ alert(e.message); }
}

document.getElementById('login-form').addEventListener('submit', async e=>{
  e.preventDefault();
  const err=document.getElementById('login-err'); err.textContent='';
  try{
    await req('POST','/api/auth/login',{username:document.getElementById('u').value,password:document.getElementById('p').value});
    await showAdmin();
  }catch(ex){ err.textContent=ex.message; }
});
document.getElementById('new-user-btn').onclick=newUser;
document.getElementById('save-btn').onclick=save;
document.getElementById('reset-pw-btn').onclick=resetPw;

// Bereits angemeldet?
req('GET','/api/auth/me').then(me=>{ if(me.isAdmin) showAdmin(); }).catch(()=>{});
</script>
</body>
</html>
