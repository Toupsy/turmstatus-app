# ============================================================
# Turmstatus – Docker Compose
#
# Vorgefertigtes Multi-Arch-Image aus GHCR (die NAS baut nicht selbst).
# Läuft OHNE .env: alle Variablen haben hier sinnvolle Defaults.
#   docker compose up -d
#
# ⚠ Für den Produktivbetrieb die mit "ÄNDERN" markierten Secrets
#   überschreiben – entweder als Shell-/Portainer-Environment-Variable
#   oder direkt unten im Default eintragen:
#     MASTER_SECRET=... SESSION_SECRET=... ADMIN_PASSWORD=... docker compose up -d
#
# Lokal selbst bauen: docker compose -f docker-compose.build.yml up -d --build
# ============================================================

x-turmstatus-base: &turmstatus-base
  image: ghcr.io/toupsy/turmstatus-app:${IMAGE_TAG:-latest}
  restart: unless-stopped
  environment:
    NODE_ENV: ${NODE_ENV:-production}
    # Ohne TLS-Reverse-Proxy false lassen, sonst kommt der Session-Cookie nicht zurück.
    COOKIE_SECURE: ${COOKIE_SECURE:-false}
    # ── Secrets (für Produktion ÄNDERN) ──────────────────────
    MASTER_SECRET: ${MASTER_SECRET:-aendern-32-zeichen-langes-master-secret}
    SALT: ${SALT:-aendern-16-zeichen-salt}
    SESSION_SECRET: ${SESSION_SECRET:-aendern-session-secret-16}
    # ── Erst-Admin / Hauptwache ──────────────────────────────
    ADMIN_USERNAME: ${ADMIN_USERNAME:-hauptwache}
    ADMIN_PASSWORD: ${ADMIN_PASSWORD:-wache2024}  # ÄNDERN
    # ── Selbstregistrierung: disabled | open | code ──────────
    REGISTRATION_MODE: ${REGISTRATION_MODE:-disabled}
  volumes:
    - turmstatus-data:/app/data
  networks:
    - turmstatus

services:
  # Haupt-App (Lagebild) auf Port 3002 → Host HTTP_PORT (Default 3002)
  turmstatus:
    <<: *turmstatus-base
    container_name: dlrg-turmstatus
    ports:
      - "${HTTP_PORT:-3002}:3002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3002/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Admin-Panel auf Port 3003 (gleiches Image, anderer Entry-Point)
  turmstatus-admin:
    <<: *turmstatus-base
    container_name: dlrg-turmstatus-admin
    command: node server/admin-server.js
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      MASTER_SECRET: ${MASTER_SECRET:-aendern-32-zeichen-langes-master-secret}
      SALT: ${SALT:-aendern-16-zeichen-salt}
      SESSION_SECRET: ${SESSION_SECRET:-aendern-session-secret-16}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-hauptwache}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-wache2024}
      REGISTRATION_MODE: ${REGISTRATION_MODE:-disabled}
      ADMIN_PORT: "3003"
    ports:
      - "${ADMIN_HTTP_PORT:-3003}:3003"
    depends_on:
      turmstatus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3003/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  turmstatus:

volumes:
  turmstatus-data:
