# ============================================================
# Turmstatus – Docker Compose (vorgefertigtes GHCR-Image)
#
#   docker compose up -d
#
# EIN Container, EIN Prozess, ZWEI Ports:
#   - 3002 (öffentliche Operativ-App) → darf via Cloudflare/Reverse-Proxy nach außen
#   - 3003 (interner Admin-Bereich)   → NUR an 127.0.0.1 des Hosts gebunden,
#     damit er NIE nach außen erreichbar ist. Die Admin-API existiert ohnehin
#     ausschließlich auf diesem Listener (auf 3002 → 404).
#
# ⚠ Für Produktion die mit "ÄNDERN" markierten Secrets überschreiben (Shell/Portainer).
# Lokal selbst bauen: docker compose -f docker-compose.build.yml up -d --build
# ============================================================

services:
  turmstatus:
    image: ghcr.io/toupsy/turmstatus-app:${IMAGE_TAG:-latest}
    container_name: dlrg-turmstatus
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # Ohne TLS-Reverse-Proxy false lassen, sonst kommt der Session-Cookie nicht zurück.
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # ── Secret (für Produktion ÄNDERN, min. 32 Zeichen) ──
      SESSION_SECRET: ${SESSION_SECRET:-aendern-session-secret-mindestens-32-zeichen}
      # ── Erst-Admin / Hauptwache ──
      ADMIN_USERNAME: ${ADMIN_USERNAME:-hauptwache}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-wache2024} # ÄNDERN
      # ── Selbstregistrierung: disabled | open | code ──
      REGISTRATION_MODE: ${REGISTRATION_MODE:-disabled}
      REGISTRATION_CODE: ${REGISTRATION_CODE:-}
      # Hinter Cloudflare/NGINX die echte Client-IP übernehmen.
      TRUST_PROXY: ${TRUST_PROXY:-1}
    volumes:
      - turmstatus-data:/app/data
    networks:
      - turmstatus
    ports:
      - "${HTTP_PORT:-3002}:3002"
      # Admin NUR host-lokal → nicht von außen / nicht via Cloudflare-Tunnel erreichbar.
      - "127.0.0.1:${ADMIN_HTTP_PORT:-3003}:3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  turmstatus:

volumes:
  turmstatus-data:
