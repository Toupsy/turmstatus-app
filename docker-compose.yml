# ============================================================
# Turmstatus – Wach- und Statussystem · Produktions-Deployment
# Optimiert für UGREEN NAS (UGOS Pro) + Portainer.
#
# Die Container-Images werden per GitHub Actions als Multi-Arch-Images
# (amd64 + arm64) nach GHCR gebaut. Die NAS LÄDT die Images nur – sie
# baut NICHT selbst (schnell & ressourcenschonend auf dem NAS).
#
# Secrets werden NICHT in dieser Datei gespeichert, sondern als
# Environment-Variablen direkt im Portainer-Stack gesetzt (Stack-Editor
# → "Environment variables"). So liegt kein Geheimnis in Git oder auf der
# Platte. Pflichtwerte (mit :? markiert) verhindern einen Start ohne Secret.
#
# Erforderliche Variablen:  POSTGRES_PASSWORD, SECRET_KEY, ADMIN_PASSWORD
# Optionale Variablen:      HTTP_PORT (Standard 3456), CORS_ORIGINS,
#                           POSTGRES_USER, POSTGRES_DB, ADMIN_USERNAME,
#                           IMAGE_TAG (Standard latest)
#
# Erzeugen sicherer Werte:
#   openssl rand -base64 24   # POSTGRES_PASSWORD / ADMIN_PASSWORD
#   openssl rand -hex 32      # SECRET_KEY
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: dlrg-turmstatus-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-turmstatus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss im Portainer-Stack gesetzt werden}
      POSTGRES_DB: ${POSTGRES_DB:-turmstatus}
    volumes:
      - turmstatus-db:/var/lib/postgresql/data
    networks:
      - turmstatus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-turmstatus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/toupsy/turmstatus-backend:${IMAGE_TAG:-latest}
    container_name: dlrg-turmstatus-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-turmstatus}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD muss gesetzt werden}@db:5432/${POSTGRES_DB:-turmstatus}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY muss im Portainer-Stack gesetzt werden}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-hauptwache}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD muss im Portainer-Stack gesetzt werden}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    networks:
      - turmstatus
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ghcr.io/toupsy/turmstatus-frontend:${IMAGE_TAG:-latest}
    container_name: dlrg-turmstatus-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-3456}:80"
    networks:
      - turmstatus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  turmstatus:
    driver: bridge

volumes:
  turmstatus-db:
