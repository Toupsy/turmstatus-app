# Eigenständige Docker-Compose-Datei – alle Werte direkt eingetragen, keine .env nötig.
#
# SICHERHEIT: Die mit "AENDERN_" markierten Platzhalter VOR dem Start durch echte
# Geheimnisse ersetzen. Diese NICHT ins Git committen – nur lokal/in Portainer setzen.
# Neue Werte erzeugen:
#   POSTGRES_PASSWORD / ADMIN_PASSWORD:  openssl rand -base64 24
#   SECRET_KEY:                          openssl rand -hex 32
#
# Erst-Login Hauptwache:  Benutzer "hauptwache" / Passwort = ADMIN_PASSWORD.
# Nach dem ersten Login das Admin-Passwort in der Benutzerverwaltung ändern.
#
# Start:   docker compose up -d --build
# Aufruf:  http://<NAS-IP>:3456

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: turmstatus
      POSTGRES_PASSWORD: AENDERN_db_passwort        # identisch mit DATABASE_URL unten setzen
      POSTGRES_DB: turmstatus
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turmstatus"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://turmstatus:AENDERN_db_passwort@db:5432/turmstatus
      SECRET_KEY: AENDERN_langer_zufallswert
      ADMIN_USERNAME: hauptwache
      ADMIN_PASSWORD: AENDERN_admin_passwort
      CORS_ORIGINS: "*"
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3456:80"                              # Host-Port 3456 -> bei Bedarf hier ändern (z. B. "3460:80")

volumes:
  db_data:
