# ================================================================================
# Cloudflare Workers Configuration – Turmstatus PR-Preview/Demo
#
# Deployt NUR die statischen SPA-Builds (Demo-Modus, kein Backend).
# `dist-preview/` wird im Workflow .github/workflows/deploy-preview.yml
# zusammengesetzt: apps/web/dist → /  und  apps/admin/dist → /admin/.
# ================================================================================

name = "turmstatus"
main = "worker/index.js"
account_id = "c305b2e473befd23d3a8cab94cb3483f"
workers_dev = true
compatibility_date = "2026-06-04"

# Asset-Verzeichnis (im CI gebaute SPAs)
[assets]
directory = "dist-preview/"
binding = "ASSETS"

# ================================================================================
# Preview Environment (Pull Requests + Demo von main)
# ================================================================================
[env.preview]

[env.preview.vars]
ENVIRONMENT = "preview"
