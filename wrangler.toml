# ================================================================================
# Cloudflare Workers Configuration – Turmstatus
# (deckungsgleich zum Wachplan-Generator; nur Namen/Ports/Domain unterscheiden sich)
# ================================================================================

name = "turmstatus-app"
main = "src/worker.js"
account_id = "c305b2e473befd23d3a8cab94cb3483f"
workers_dev = true
compatibility_date = "2026-06-04"

# Asset directory (static files from public/)
[assets]
directory = "public/"
binding = "ASSETS"

# ================================================================================
# Production Environment
# ================================================================================
[env.production]
# routes = [
#   { pattern = "turmstatus.de/*", zone_name = "turmstatus.de" }
# ]

[env.production.vars]
ENVIRONMENT = "production"
ORIGIN_SERVER = "https://turmstatus.de"

# ================================================================================
# Development Environment
# ================================================================================
[env.development]

[env.development.vars]
ENVIRONMENT = "development"
DEV_ORIGIN_SERVER = "http://localhost:3002"

# ================================================================================
# Preview Environment (for Pull Requests – kein Backend, Demo-Modus)
# ================================================================================
[env.preview]

[env.preview.vars]
ENVIRONMENT = "preview"
