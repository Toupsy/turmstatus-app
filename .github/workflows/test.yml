name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (shared + api)
        run: npm run typecheck
      - name: Svelte-Check (web + admin)
        run: |
          npm run check --workspace @turmstatus/web
          npm run check --workspace @turmstatus/admin
      - name: Build (SPAs + API)
        run: npm run build
      - name: Unit- & Integrationstests
        run: npm test
