name: Deploy Preview to Cloudflare Workers

# Baut beide SPAs und deployt sie als statische Demo (Demo-Modus im Browser,
# kein Backend) auf Cloudflare Workers – pro PR eine eigene URL.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Get deployment name
        id: branch
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            WORKER_NAME="turmstatus-preview-pr-${{ github.event.pull_request.number }}"
          else
            WORKER_NAME="turmstatus-demo"
          fi
          echo "worker_name=$WORKER_NAME" >> $GITHUB_OUTPUT
          echo "is_pr=${{ github.event_name == 'pull_request' }}" >> $GITHUB_OUTPUT

      - name: Build SPAs (Web auf /, Admin auf /admin/)
        run: |
          npm run build --workspace @turmstatus/web
          npm run build --workspace @turmstatus/admin -- --base=/admin/
          rm -rf dist-preview
          mkdir -p dist-preview/admin
          cp -r apps/web/dist/. dist-preview/
          cp -r apps/admin/dist/. dist-preview/admin/

      - name: Deploy to Cloudflare Workers
        id: deploy
        run: |
          OUT=$(npx wrangler deploy \
            --env preview \
            --name "${{ steps.branch.outputs.worker_name }}" 2>&1)
          echo "$OUT"
          # Deployte URL aus der wrangler-Ausgabe ziehen (enthält die Account-Subdomain).
          URL=$(echo "$OUT" | grep -oE 'https://[a-zA-Z0-9.-]+\.workers\.dev' | head -1)
          echo "preview_url=${URL:-https://${{ steps.branch.outputs.worker_name }}.workers.dev}" >> $GITHUB_OUTPUT
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Comment PR with preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            const prNumber = context.issue.number;

            const body = `## 🚀 Demo-Preview

            Die Änderungen sind als **Demo (ohne Backend)** deployt – Rollen-Umschalter oben rechts:
            **[👉 Demo öffnen](${previewUrl})** · [Admin-Panel](${previewUrl}/admin/)

            | Ansicht | Was geht |
            |---|---|
            | Wachführer | sieht -1/K-Fahrt-Anfragen live, genehmigt/lehnt ab, verwaltet Türme/Boote/Personal |
            | Wachgänger | beantragt -1 |
            | Bootsführer | beantragt K-Fahrt, setzt Boot-Status |
            | Hauptwache (Admin) | Gesamtsicht + Admin-Panel unter /admin/ |

            💡 Zwei Browser-Tabs mit verschiedenen Rollen öffnen → Live-Updates zwischen den Tabs.
            Die Daten liegen nur im Browser (localStorage); „Demo zurücksetzen" stellt den Seed wieder her.
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existingComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Demo-Preview')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

      - name: Deployment info
        run: |
          echo "✅ Deployment successful!"
          echo "URL: ${{ steps.deploy.outputs.preview_url }}"
