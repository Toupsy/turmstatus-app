# ============================================================
# Turmstatus – Docker Compose (lokal selbst bauen / Entwicklung)
#
#   SESSION_SECRET=mindestens-32-zeichen-langes-secret-hier \
#     ADMIN_PASSWORD=wache2024 docker compose -f docker-compose.build.yml up -d --build
#
# Admin-Port ist auch hier NUR host-lokal gebunden (127.0.0.1:3003).
# ============================================================

services:
  turmstatus:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: dlrg-turmstatus
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET muss gesetzt sein (min. 32 Zeichen)}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-hauptwache}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD muss gesetzt sein}
      REGISTRATION_MODE: ${REGISTRATION_MODE:-disabled}
    volumes:
      - turmstatus-data:/app/data
    networks:
      - turmstatus
    ports:
      - "${HTTP_PORT:-3002}:3002"
      - "127.0.0.1:${ADMIN_HTTP_PORT:-3003}:3003"

networks:
  turmstatus:

volumes:
  turmstatus-data:
