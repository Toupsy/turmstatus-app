# ============================================================
# Turmstatus – Docker Compose (lokal selbst bauen / Entwicklung)
#
#   POSTGRES_PASSWORD nicht nötig – SQLite-Datei im Volume.
#   MASTER_SECRET=test SALT=testtesttesttest SESSION_SECRET=test \
#     ADMIN_PASSWORD=wache2024 docker compose -f docker-compose.build.yml up -d --build
#
# WICHTIG: EIN Container bedient BEIDE Ports (App 3002 + Admin 3003 via ADMIN_PORT).
# Zwei Container auf demselben Volume öffneten dieselbe SQLite-Datei → SQLITE_CORRUPT.
# ============================================================

services:
  turmstatus:
    build: .
    container_name: dlrg-turmstatus
    restart: unless-stopped
    environment:
      MASTER_SECRET: ${MASTER_SECRET:?MASTER_SECRET muss gesetzt sein (min. 32 Zeichen)}
      SALT: ${SALT:?SALT muss gesetzt sein (min. 16 Zeichen)}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET muss gesetzt sein (min. 16 Zeichen)}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-hauptwache}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD muss gesetzt sein}
      REGISTRATION_MODE: ${REGISTRATION_MODE:-disabled}
      # Eingebettetes Admin-Panel im selben Prozess auf Port 3003
      ADMIN_PORT: "3003"
    volumes:
      - turmstatus-data:/app/data
    networks:
      - turmstatus
    ports:
      - "${HTTP_PORT:-3002}:3002"
      - "${ADMIN_HTTP_PORT:-3003}:3003"

networks:
  turmstatus:

volumes:
  turmstatus-data:
